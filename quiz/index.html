<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Copy Quiz — Ton plan copywriting pour 3 000€/mois</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAFAFA;
    --card:#FFFFFF;
    --ink:#1A1A1A;
    --ink-soft:#6B6B6B;
    --line:#E5E5E5;
    --accent:#F5A623;       /* jaune signature */
    --accent-soft:#FFF3D6;
    --accent-press:#D68A0A; /* jaune foncé — texte/accent lisible */
    --marker:#FFE15A;       /* surligneur signature */
    --radius:18px;
    --maxw:520px;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
    display:flex;
    flex-direction:column;
    min-height:100dvh;
  }

  /* ---------- Top bar / progress ---------- */
  .topbar{
    position:sticky;top:0;z-index:10;
    background:var(--paper);
    padding:18px 20px 14px;
  }
  .topbar-inner{max-width:var(--maxw);margin:0 auto;display:flex;align-items:center;gap:14px}
  .brand{
    font-family:'Inter',system-ui,sans-serif;
    font-weight:800;font-size:15px;letter-spacing:-.02em;white-space:nowrap;
    display:inline-flex;align-items:center;gap:6px;
  }
  .brand-mark{height:19px;width:auto;display:block;flex-shrink:0}
  .brand span{color:var(--accent-press)}
  .progress-track{flex:1;height:7px;background:var(--line);border-radius:99px;overflow:hidden}
  .progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent-press));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
  .progress-pct{font-size:12px;font-weight:600;color:var(--ink-soft);width:34px;text-align:right;font-variant-numeric:tabular-nums}

  /* ---------- Stage ---------- */
  .stage{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:8px 20px 40px}
  .screen{
    width:100%;max-width:var(--maxw);
    animation:enter .45s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes enter{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){
    .screen{animation:none}
    .progress-fill{transition:none}
    .hl::after{animation:none;width:100% !important}
  }

  .eyebrow{
    display:inline-block;font-size:12px;font-weight:600;letter-spacing:.08em;
    text-transform:uppercase;color:var(--accent-press);margin-bottom:14px;
  }
  h1{
    font-family:'Inter',system-ui,sans-serif;
    font-weight:800;letter-spacing:-.02em;line-height:1.12;
    font-size:clamp(26px,6.5vw,34px);margin-bottom:10px;
  }
  .lead{color:var(--ink-soft);font-size:16px;margin-bottom:8px}
  .lead.big{font-size:17px;color:var(--ink);margin-bottom:6px}

  /* surligneur signature */
  .hl{position:relative;white-space:nowrap;z-index:0}
  .hl::after{
    content:"";position:absolute;left:-3px;right:-3px;bottom:2px;height:42%;
    background:var(--marker);z-index:-1;border-radius:3px;
    transform:skewX(-4deg);
    width:0;animation:swipe .6s .25s cubic-bezier(.4,0,.2,1) forwards;
  }
  @keyframes swipe{to{width:calc(100% + 6px)}}

  /* ---------- Options ---------- */
  .options{display:flex;flex-direction:column;gap:11px;margin-top:24px}
  .opt{
    display:flex;align-items:center;gap:13px;
    background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);
    padding:17px 18px;cursor:pointer;text-align:left;width:100%;
    font-family:inherit;font-size:16px;color:var(--ink);font-weight:500;
    transition:border-color .15s,background .15s,transform .08s;
  }
  .opt:hover{border-color:var(--accent);background:#fff}
  .opt:active{transform:scale(.99)}
  .opt:focus-visible{outline:3px solid var(--accent-soft);outline-offset:2px}
  .opt .emoji{font-size:21px;line-height:1;flex-shrink:0}
  .opt .tick{
    margin-left:auto;width:22px;height:22px;border-radius:50%;
    border:2px solid var(--line);flex-shrink:0;position:relative;transition:border-color .15s;
  }
  .opt.selected{border-color:var(--accent);background:var(--accent-soft)}
  .opt.selected .tick{border-color:var(--accent-press);background:var(--accent-press)}
  .opt.selected .tick::after{
    content:"";position:absolute;left:6px;top:2px;width:6px;height:11px;
    border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);
  }

  /* ---------- Scale (likert) ---------- */
  .scale{display:flex;gap:9px;margin-top:26px}
  .scale-btn{
    flex:1;aspect-ratio:1;min-height:54px;border:1.5px solid var(--line);
    background:var(--card);border-radius:14px;cursor:pointer;
    font-family:'Inter',system-ui,sans-serif;font-weight:700;font-size:19px;color:var(--ink);
    transition:all .12s;
  }
  .scale-btn:hover{border-color:var(--accent);color:var(--accent-press)}
  .scale-btn:active{transform:scale(.95)}
  .scale-btn:focus-visible{outline:3px solid var(--accent-soft);outline-offset:2px}
  .scale-labels{display:flex;justify-content:space-between;margin-top:11px;font-size:12.5px;color:var(--ink-soft)}

  /* ---------- CTA ---------- */
  .cta{
    display:inline-flex;align-items:center;justify-content:center;gap:9px;
    width:100%;margin-top:28px;background:var(--accent);color:var(--ink);
    border:none;border-radius:var(--radius);padding:18px;cursor:pointer;
    font-family:'Inter',system-ui,sans-serif;font-weight:700;font-size:17px;
    transition:background .15s,transform .08s;
  }
  .cta:hover{background:var(--accent-press)}
  .cta:active{transform:scale(.99)}
  .cta:focus-visible{outline:3px solid var(--accent-soft);outline-offset:3px}
  .cta .arrow{transition:transform .15s}
  .cta:hover .arrow{transform:translateX(4px)}

  /* ---------- Media placeholders (à remplacer par l'associé) ---------- */
  .media-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:24px}
  .media-grid.single{grid-template-columns:1fr}
  .media{
    border:2px dashed #C9C3B6;border-radius:14px;background:#FBFAF7;
    aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:6px;color:#9A9484;font-size:12.5px;font-weight:600;text-align:center;padding:10px;
  }
  .media.video{aspect-ratio:16/9}
  .media .ico{font-size:22px}
  .proof-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:22px}
  .proof-card{
    border:2px dashed #C9C3B6;border-radius:12px;background:#FBFAF7;aspect-ratio:9/16;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:6px;color:#9A9484;font-size:11px;font-weight:600;text-align:center;padding:8px;
  }
  .proof-card .ico{font-size:18px}

  .note{
    margin-top:22px;font-size:12.5px;color:#A39C8C;
    border-top:1px dashed var(--line);padding-top:12px;
  }
  .back{
    background:none;border:none;color:var(--ink-soft);font-family:inherit;font-size:14px;
    cursor:pointer;padding:8px 0;margin-bottom:4px;display:inline-flex;align-items:center;gap:5px;
  }
  .back:hover{color:var(--ink)}
  .back.hidden{visibility:hidden}

  /* ---------- Final ---------- */
  .final-badge{
    display:inline-flex;align-items:center;gap:7px;background:var(--accent-soft);color:var(--accent-press);
    font-weight:600;font-size:13px;padding:7px 13px;border-radius:99px;margin-bottom:16px;
  }

  /* ---------- Capture lead ---------- */
  .lead-form{margin-top:22px;display:flex;flex-direction:column;gap:11px}
  .field-lead{
    width:100%;font-family:inherit;font-size:16px;color:var(--ink);
    background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);
    padding:16px 18px;transition:border-color .15s,box-shadow .15s;
  }
  .field-lead::placeholder{color:#b0aca3}
  .field-lead:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .lead-error{display:none;color:#D92D20;font-size:13.5px;font-weight:600}
  .lead-error.show{display:block}
  .lead-form .cta{margin-top:5px}
  .lead-trust{text-align:center;font-size:12.5px;color:var(--ink-soft)}
</style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand"><svg class="brand-mark" viewBox="0 0 287 586" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M91.3941 378.634L101.769 417.353L176.082 458.699L216.786 566.358L198.207 452.771L213.283 413.162L186.063 429.77L231.517 341.089L221.142 302.371L210.768 263.653L149.105 313.769L190.019 186.217L179.644 147.499L169.27 108.78L70.0612 18.774L29.1473 146.326L128.356 236.333L49.8963 223.762L60.2707 262.48L70.6452 301.198L169.854 391.205L91.3941 378.634Z" fill="#FEAA02"/></svg>Le Copy <span>Quiz</span></div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-pct" id="progressPct">0%</div>
    </div>
  </div>

  <main class="stage">
    <div class="screen" id="screen"></div>
  </main>

<script>
/* =========================================================================
   QUIZ COPYWRITING — moteur conditionnel
   -------------------------------------------------------------------------
   Tout est piloté par l'objet `screens` ci-dessous.
   Les réponses sont stockées dans `answers` (voir console + finishQuiz()).
   ========================================================================= */

const answers = {};
const history = [];          // pile des écrans visités (pour le bouton retour)

/* ---- helpers de texte dynamique ---- */
function problemLabel(){
  const map = {
    clients:   "trouver des clients",
    prospect:  "la prospection",
    niveau:    "tes doutes sur ton niveau",
    temps:     "ton organisation",
    plan:      "te construire un plan d'action"
  };
  return map[answers.problem] || "ce blocage";
}
function screenTimeLabel(){
  const map = {
    low:  "le temps que tu passes déjà sur les écrans",
    mid:  "les 2 à 4h par jour que tu passes sur les écrans",
    high: "les +4h par jour que tu passes sur les écrans"
  };
  return map[answers.screenTime] || "tout ce temps sur les écrans";
}

/* ---- options conditionnelles pour "qu'as-tu déjà essayé ?" ---- */
const attemptedOptions = {
  clients: [
    "J'ai posté sur les réseaux en espérant qu'on me contacte",
    "J'ai envoyé des messages en DM",
    "Je me suis inscrit sur des plateformes (Malt, Fiverr…)",
    "Pour être honnête, je n'ai pas vraiment essayé"
  ],
  prospect: [
    "J'ai envoyé des DM à froid",
    "J'ai envoyé des emails de prospection",
    "J'ai commenté et interagi sous des posts",
    "Je n'ai jamais osé prospecter pour de vrai"
  ],
  niveau: [
    "J'ai enchaîné les formations et les vidéos",
    "Je me suis entraîné à écrire dans mon coin",
    "J'ai fait relire mon travail à d'autres",
    "Je reste bloqué sans trop savoir quoi faire"
  ],
  temps: [
    "J'ai essayé de me faire un planning",
    "Je m'y mets le soir ou le week-end",
    "J'ai testé plusieurs méthodes d'organisation",
    "J'ai abandonné plusieurs fois faute de temps"
  ],
  plan: [
    "J'ai suivi des formations un peu dans tous les sens",
    "J'ai copié ce que font d'autres copywriters",
    "J'ai avancé au feeling, sans vraie méthode",
    "Pour être honnête, je n'ai jamais eu de plan clair"
  ]
};

/* =========================================================================
   DÉFINITION DES ÉCRANS
   type: 'choice' | 'scale' | 'info' | 'final'
   next: fonction qui renvoie l'id de l'écran suivant (ou null = fin)
   ========================================================================= */
const screens = {

  /* ---------- PAGE 1 ---------- */
  status:{
    progress:5, type:'choice', save:'status',
    question:"Actuellement, tu es :",
    options:[
      {emoji:"🎓", label:"Étudiant",  value:"etudiant"},
      {emoji:"💼", label:"Salarié",   value:"salarie"},
      {emoji:"🧑‍💻", label:"Freelance", value:"freelance"}
    ],
    next:()=>'hook1'
  },

  /* ---------- PAGE 2 (accroche) ---------- */
  hook1:{
    progress:10, type:'info',
    eyebrow:"Le constat",
    html:`<h1>7 débutants sur 10 <span class="hl">abandonnent</span> le copywriting</h1>
          <p class="lead big">…parce qu'ils ne trouvent jamais de clients.</p>
          <p class="lead">Mais peu savent qu'il existe une autre approche : trouver des clients <strong>premium</strong> en moins de <strong>45 jours</strong>.</p>`,
    media:[ {label:"PHOTO / preuve"},{label:"PHOTO / preuve"},{label:"PHOTO / preuve"},{label:"PHOTO / preuve"} ],
    cta:"Continuer",
    next:()=>'motivation'
  },

  /* ---------- PAGE 3 ---------- */
  motivation:{
    progress:18, type:'choice', save:'motivation',
    question:"Qu'est-ce qui te motive le plus à devenir copywriter ?",
    options:[
      {emoji:"🎓", label:"Pouvoir quitter mon job (ou mes études) au plus vite", value:"quitter"},
      {emoji:"💸", label:"Gagner plus d'argent !", value:"argent"},
      {emoji:"🌍", label:"Être libre de travailler depuis n'importe où.", value:"liberte"},
      {emoji:"❤️", label:"Faire un métier qui me motive chaque matin.", value:"passion"}
    ],
    next:()=>'tried'
  },

  /* ---------- PAGE 4 (aiguillage principal) ---------- */
  tried:{
    progress:26, type:'choice', save:'tried',
    question:"As-tu déjà essayé de te lancer dans le copywriting ?",
    options:[
      {emoji:"✅", label:"Oui", value:"oui"},
      {emoji:"🚫", label:"Non", value:"non"}
    ],
    next:()=> answers.tried==='oui' ? 'level' : 'whyNot'
  },

  /* ===================== BRANCHE « OUI » ===================== */
  level:{
    progress:33, type:'choice', save:'level',
    question:"Selon toi, quel est ton niveau actuel ?",
    options:[
      {label:"Grand débutant, je pars de zéro", value:"debut"},
      {label:"J'ai les bases, mais j'ai du mal à les appliquer", value:"bases"},
      {label:"J'ai un bon niveau d'écriture, mais peu (voire pas) de clients avec qui travailler", value:"sansclients"},
      {label:"Niveau confirmé, mais des résultats irréguliers", value:"irregulier"}
    ],
    next:()=>'problem'
  },

  problem:{
    progress:39, type:'choice', save:'problem',
    question:"Quelle est ta plus grosse problématique aujourd'hui ?",
    options:[
      {label:"Je n'arrive pas à trouver de clients", value:"clients"},
      {label:"Je ne sais pas par où démarrer la prospection", value:"prospect"},
      {label:"Je doute de mon niveau et de mes compétences", value:"niveau"},
      {label:"Je manque de temps et d'organisation pour être efficace", value:"temps"},
      {label:"Je n'ai AUCUN plan d'action pour atteindre les 3.000€/mois", value:"plan"}
    ],
    next:()=>'attempted'
  },

  attempted:{
    progress:45, type:'choice', save:'attempted',
    question:()=>`Qu'as-tu déjà essayé pour ${problemLabel()} ?`,
    options:()=> attemptedOptions[answers.problem].map((label,i)=>({label,value:'a'+i})),
    next:()=>'reassureOui'
  },

  reassureOui:{
    progress:52, type:'info',
    eyebrow:"Rassure-toi",
    html:`<h1>C'est <span class="hl">normal</span> si tu n'as pas eu de vrais résultats.</h1>
          <p class="lead big">Ce qu'il te faut, ce n'est pas une méthode « secrète ».</p>
          <p class="lead">C'est un plan personnalisé, adapté à ton profil, tes objectifs et ton emploi du temps. On va aller un cran plus loin pour comprendre ce qui te bloque encore.</p>`,
    media:[ {label:"PHOTO"},{label:"PHOTO"},{label:"PHOTO"} ],
    cta:"Continuer",
    next:()=>'likert1'
  },

  /* ===================== BRANCHE « NON » ===================== */
  whyNot:{
    progress:33, type:'choice', save:'whyNot',
    question:"Pourquoi tu ne t'es pas encore lancé ?",
    options:[
      {emoji:"😨", label:"La peur de me lancer", value:"peur"},
      {emoji:"💳", label:"Le prix des formations", value:"prix"},
      {emoji:"⏳", label:"Je n'ai pas le temps", value:"temps"}
    ],
    next:()=> answers.whyNot==='temps' ? 'screenTime'
            : answers.whyNot==='peur'  ? 'fearObjection'
            : 'priceObjection'
  },

  fearObjection:{
    progress:44, type:'info',
    eyebrow:"Respire",
    html:`<h1>La peur ne partira <span class="hl">JAMAIS</span>.</h1>
          <p class="lead big">Mais tous ceux qui réussissent aujourd'hui sont passés par exactement le même doute que toi.</p>
          <p class="lead">La seule différence ? Ils ont suivi un plan d'action clair, étape par étape. Car quand tu sais précisément quoi faire tous les jours, la peur laisse place à l'action !</p>`,
    proof:[ "TÉMOIGNAGE","TÉMOIGNAGE","TÉMOIGNAGE" ],
    cta:"Ok, on continue",
    next:()=>'likert1'
  },

  priceObjection:{
    progress:44, type:'info',
    eyebrow:"Parlons-en",
    html:`<h1>Certaines formations sont chères… mais le vrai coût, c'est de <span class="hl">ne rien faire</span> !</h1>
          <p class="lead big">Si tu travailles sérieusement… se former, c'est un investissement. Et pas une dépense.</p>
          <p class="lead">Et honnêtement, avec la bonne méthode, un seul client peut te rembourser ta formation. C'est d'ailleurs ce qui se passe pour tous mes clients.</p>`,
    media:[ {label:"SCREEN RÉSULTAT"},{label:"SCREEN RÉSULTAT"} ],
    video:"VIDÉO RÉSULTAT",
    cta:"Vu comme ça… on continue",
    next:()=>'likert1'
  },

  screenTime:{
    progress:40, type:'choice', save:'screenTime',
    question:"Soyons honnêtes… combien de temps tu passes sur les écrans chaque jour ?",
    options:[
      {label:"Moins de 2h par jour", value:"low"},
      {label:"Entre 2h et 4h par jour", value:"mid"},
      {label:"Plus de 4h par jour", value:"high"}
    ],
    next:()=>'timeObjection'
  },

  timeObjection:{
    progress:47, type:'info',
    eyebrow:"Petite question",
    html:()=>`<h1>Et si tu utilisais <span class="hl">ce temps</span> autrement ?</h1>
          <p class="lead big">Tu ne penses pas qu'avec ${screenTimeLabel()}, tu pourrais développer une compétence et lancer un business pour devenir libre ?</p>
          <p class="lead">On est d'accord : ce n'est donc pas vraiment une question de temps. 😉</p>
          <p class="lead" style="margin-top:18px"><strong>Ils ont eu leurs premiers résultats en moins de 2h par jour :</strong></p>`,
    proof:[ "TÉMOIGNAGE","TÉMOIGNAGE","TÉMOIGNAGE" ],
    cta:"Carrément, on continue",
    next:()=>'likert1'
  },

  /* ===================== TRONC COMMUN ===================== */
  /* ---------- PAGE 6 : 5 phrases, 1 par écran ---------- */
  likert1:{
    progress:58, type:'scale', save:'likert1',
    eyebrow:"À quel point cette phrase te parle ?",
    question:"« Quand j'ouvre mon ordinateur je ne sais pas précisément sur quoi travailler (formation, écriture, prospection…). »",
    next:()=>'likert2'
  },
  likert2:{
    progress:62, type:'scale', save:'likert2',
    eyebrow:"À quel point cette phrase te parle ?",
    question:"« Je passe plus de temps à me former qu'à passer à l'action et gagner de l'argent. »",
    next:()=>'likert3'
  },
  likert3:{
    progress:66, type:'scale', save:'likert3',
    eyebrow:"À quel point cette phrase te parle ?",
    question:"« Je ne sais pas si c'est mon niveau, ma prospection ou mon offre qui me bloque. »",
    next:()=>'midProof'
  },

  midProof:{
    progress:68, type:'info',
    eyebrow:"On continue",
    html:`<h1>Tiens bon… le plus <span class="hl">intéressant</span> arrive.</h1>
          <p class="lead big">À la fin de ce quiz, tu repars avec le plan d'action exact, adapté à ton profil, pour faire tes premiers 3.000€/mois dans le copy même si tu pars de 0.</p>
          <p class="lead">Ce plan là, ils l'ont suivi 👇</p>`,
    proof:[ "TÉMOIGNAGE","TÉMOIGNAGE","TÉMOIGNAGE" ],
    cta:"Je continue",
    next:()=>'likert4'
  },
  likert4:{
    progress:70, type:'scale', save:'likert4',
    eyebrow:"À quel point cette phrase te parle ?",
    question:"« On m'a promis de gagner de l'argent, mais je suis toujours bloqué à 0. »",
    next:()=>'likert5'
  },
  likert5:{
    progress:74, type:'scale', save:'likert5',
    eyebrow:"À quel point cette phrase te parle ?",
    question:"« J'aimerais avoir un plan d'action clair au lieu d'avancer au feeling. »",
    next:()=>'generated'
  },

  /* ---------- PAGE 7 ---------- */
  generated:{
    progress:79, type:'choice', save:'generated',
    question:"Combien as-tu généré grâce à ton activité de copywriting ?",
    options:[
      {label:"0 € — je n'ai pas encore commencé à gagner", value:"0"},
      {label:"Moins de 500 €", value:"<500"},
      {label:"Entre 500 € et 1 000 €", value:"500-1000"},
      {label:"Entre 1 000 € et 3 000 €", value:"1000-3000"},
      {label:"Plus de 3 000 €", value:">3000"}
    ],
    next:()=>'goal'
  },

  /* ---------- PAGE 8 ---------- */
  goal:{
    progress:84, type:'choice', save:'goal',
    question:"Combien aimerais-tu gagner dans 6 mois ?",
    options:[
      {label:"1 000 € / mois pour commencer", value:"1000"},
      {label:"3 000 € / mois", value:"3000"},
      {label:"5 000 € / mois", value:"5000"},
      {label:"10 000 € / mois", value:"10000"},
      {label:"Plus de 10 000 € / mois", value:">10000"}
    ],
    next:()=>'caseStudy'
  },

  /* ---------- PAGE 9 ---------- */
  caseStudy:{
    progress:89, type:'info',
    eyebrow:"Ils l'ont fait",
    html:`<h1>Atteindre ce résultat, c'est <span class="hl">carrément possible</span>.</h1>

    options:[

/* =========================================================================
   MOTEUR DE RENDU
   ========================================================================= */
const el = document.getElementById('screen');
const fill = document.getElementById('progressFill');
const pct = document.getElementById('progressPct');

function resolve(v){ return typeof v === 'function' ? v() : v; }

function setProgress(p){
  fill.style.width = p + '%';
  pct.textContent = p + '%';
}

function render(id){
  const s = screens[id];
  if(!s){ return; }
  el.dataset.current = id;
  setProgress(s.progress);
  el.classList.remove('screen'); void el.offsetWidth; el.classList.add('screen'); // relance l'anim

  let h = '';

  /* bouton retour (sauf 1er écran) */
  const canBack = history.length > 0 && id !== 'end';
  h += `<button class="back ${canBack?'':'hidden'}" onclick="goBack()">← Retour</button>`;

  /* eyebrow */
  if(s.eyebrow) h += `<span class="eyebrow">${s.eyebrow}</span>`;

  if(s.type === 'choice'){
    h += `<h1>${resolve(s.question)}</h1>`;
    h += `<div class="options">`;
    resolve(s.options).forEach(o=>{
      h += `<button class="opt" onclick="choose('${id}','${o.value}')">
              ${o.emoji?`<span class="emoji">${o.emoji}</span>`:''}
              <span>${o.label}</span>
              <span class="tick"></span>
            </button>`;
    });
    h += `</div>`;
  }

  else if(s.type === 'scale'){
    h += `<h1 style="font-size:clamp(20px,5vw,26px)">${resolve(s.question)}</h1>`;
    h += `<div class="scale">`;
    for(let i=1;i<=5;i++){
      h += `<button class="scale-btn" onclick="choose('${id}',${i})">${i}</button>`;
    }
    h += `</div>`;
    h += `<div class="scale-labels"><span>Pas du tout</span><span>Totalement</span></div>`;
  }

  else if(s.type === 'info'){
    h += resolve(s.html);
    if(s.media) h += renderMedia(s.media);
    if(s.video) h += renderVideo(s.video);
    if(s.proof) h += renderProof(s.proof);
    h += `<button class="cta" onclick="goNext('${id}')">${s.cta} <span class="arrow">→</span></button>`;
  }

  else if(s.type === 'lead'){
    h += resolve(s.html);
    h += `<div class="lead-form">
            <input class="field-lead" id="lead-firstname" type="text" placeholder="Ton prénom" autocomplete="given-name">
            <input class="field-lead" id="lead-email" type="email" placeholder="Ton email" autocomplete="email">
            <input class="field-lead" id="lead-phone" type="tel" placeholder="Ton numéro WhatsApp" autocomplete="tel">
            <div class="lead-error" id="lead-error"></div>
            <button class="cta" onclick="submitLead()">Recevoir mon plan <span class="arrow">→</span></button>
            <p class="lead-trust">🔒 100% confidentiel. Pas de spam, jamais.</p>
          </div>`;
  }

  el.innerHTML = h;
  el.scrollIntoView({block:'start'});
}

function renderMedia(items){
  const single = items.length === 1 ? ' single' : '';
  let m = `<div class="media-grid${single}">`;
  items.forEach(it=>{
    m += `<div class="media ${it.video?'video':''}">
            <span class="ico">${it.video?'▶':'🖼️'}</span>
            <span>${it.label}</span>
          </div>`;
  });
  m += `</div>`;
  return m;
}

function renderVideo(label){
  return `<div class="media-grid single"><div class="media video">
            <span class="ico">▶</span><span>${label}</span></div></div>`;
}

function renderProof(labels){
  let p = `<div class="proof-row">`;
  labels.forEach(l=>{
    p += `<div class="proof-card"><span class="ico">▶</span><span>${l}</span></div>`;
  });
  p += `</div>`;
  return p;
}

/* ---- actions ---- */
function choose(id, value){
  const s = screens[id];
  if(s.save) answers[s.save] = value;
  goNext(id);
}

function goNext(id){
  const s = screens[id];
  history.push(id);
  const nextId = resolve(s.next);
  if(nextId){ render(nextId); }
  else { finishQuiz(); }
}

function goBack(){
  const prev = history.pop();
  if(prev) render(prev);
}

function finishQuiz(){
  console.log('✅ Quiz terminé. Réponses :', answers);
  /* >>> ASSOCIÉ : c'est ici qu'on envoie `answers` (CRM, webhook, redirection…) <<< */
}

/* =========================================================================
   TUNNEL — capture du lead, scoring profil, envoi GHL, redirection
   ========================================================================= */
const CONFIG = {
  // Inbound Webhook GoHighLevel. Vide = pas d'envoi (le quiz fonctionne quand même).
  ghlWebhookUrl: ""
};

const PROFILES = {
  p1:{ name:"Le Débutant Ambitieux", redirect:"explication_debutant_total.html" },
  p2:{ name:"Le Reconverti Motivé",  redirect:"explication_reconverti_motive_v2.html" },
  p3:{ name:"Le Formé Bloqué",       redirect:"explication_forme_bloque.html" },
  p4:{ name:"Le Freelance Instable", redirect:"explication_freelance_instable.html" },
  p5:{ name:"Le Plafond Invisible",  redirect:"explication_scaler.html" },
  p6:{ name:"L'Entrepreneur",        redirect:"explication_entrepreneur.html" }
};

/* Scoring heuristique réponses → 6 profils. Pondérations à affiner avec Sol.
   NB : p6 (Entrepreneur) reste rare faute de question « as-tu déjà un business ? ». */
function computeScores(){
  const s = {p1:0,p2:0,p3:0,p4:0,p5:0,p6:0};
  const add = m => { if(m) for(const k in m) s[k]+=m[k]; };
  const A = answers;
  add({etudiant:{p1:2,p2:1}, salarie:{p2:2,p1:1,p3:1}, freelance:{p4:3,p5:1}}[A.status]);
  if(A.tried==='non'){
    add({p1:3});
    add({peur:{p1:2}, prix:{p1:1,p2:1}, temps:{p1:1}}[A.whyNot]);
  } else if(A.tried==='oui'){
    add({debut:{p1:3}, bases:{p3:3,p1:1}, sansclients:{p3:2,p4:2}, irregulier:{p4:2,p5:2}}[A.level]);
    add({clients:{p3:1,p4:1}, prospect:{p3:1,p4:1}, niveau:{p3:2,p1:1}, temps:{p4:1,p1:1}, plan:{p1:2,p3:1}}[A.problem]);
  }
  add({quitter:{p2:2,p1:1}, argent:{p4:1,p5:1}, liberte:{p2:1,p4:1}, passion:{p1:1,p3:1}}[A.motivation]);
  add({'0':{p1:3}, '<500':{p1:2,p3:1}, '500-1000':{p3:1,p4:1}, '1000-3000':{p4:2,p5:1}, '>3000':{p5:3,p6:1}}[A.generated]);
  add({'1000':{p1:1}, '3000':{p2:1,p3:1}, '5000':{p4:1,p2:1}, '10000':{p5:2}, '>10000':{p5:2,p6:2}}[A.goal]);
  add({plan:{p3:1}, seul:{p5:1}, peur:{p1:1,p3:1}, accompagne:{p2:1,p4:1}}[A.capable]);
  return s;
}

function detectProfile(scores){
  let max=-1, top='p1';
  ['p1','p2','p3','p4','p5','p6'].forEach(p=>{ if(scores[p]>max){ max=scores[p]; top=p; } });
  return top;
}

function sendLeadToGHL(userData, scores, code){
  if(!CONFIG.ghlWebhookUrl) return;
  const p = PROFILES[code] || {};
  const payload = {
    firstName:userData.firstname, email:userData.email, phone:userData.phone,
    source:"Le Copy Quiz", quiz_version:"conditionnel",
    quiz_profile_code:code, quiz_profile_name:p.name||"",
    quiz_score_p1:scores.p1, quiz_score_p2:scores.p2, quiz_score_p3:scores.p3,
    quiz_score_p4:scores.p4, quiz_score_p5:scores.p5, quiz_score_p6:scores.p6,
    quiz_scores:JSON.stringify(scores), quiz_answers:JSON.stringify(answers),
    completed_at:new Date().toISOString()
  };
  try{
    fetch(CONFIG.ghlWebhookUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload),keepalive:true}).catch(function(){});
  }catch(e){}
}

function submitLead(){
  const firstname=(document.getElementById('lead-firstname').value||'').trim();
  const email=(document.getElementById('lead-email').value||'').trim();
  const phone=(document.getElementById('lead-phone').value||'').trim();
  const err=document.getElementById('lead-error');
  const fail=m=>{ err.textContent='⚠ '+m; err.classList.add('show'); };
  if(!firstname){ return fail('Indique ton prénom pour continuer.'); }
  if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ return fail('Indique un email valide pour recevoir ton plan.'); }
  if(!phone || phone.replace(/[^0-9]/g,'').length<8){ return fail('Indique ton numéro WhatsApp pour qu\'on puisse te contacter.'); }
  err.classList.remove('show');

  const userData = {firstname, email, phone};
  const scores = computeScores();
  const code = detectProfile(scores);

  sendLeadToGHL(userData, scores, code);
  try{
    localStorage.setItem('quiz_profile', code);
    localStorage.setItem('quiz_user', JSON.stringify(userData));
    localStorage.setItem('quiz_scores', JSON.stringify(scores));
    localStorage.setItem('quiz_answers', JSON.stringify(answers));
  }catch(e){}

  const btn = document.querySelector('.lead-form .cta');
  if(btn){ btn.disabled=true; btn.innerHTML='Redirection…'; }
  window.location.href = (PROFILES[code]||PROFILES.p1).redirect;
}

/* ---- démarrage ---- */
render('status');
</script>
